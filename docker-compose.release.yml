services:
  minio:
    image: minio/minio:latest
    container_name: logixpack-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE in .env}
    container_name: logixpack-backend
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-rpc-instances}
      MINIO_SECURE: "false"
    depends_on:
      - minio
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:?Set FRONTEND_IMAGE in .env}
    container_name: logixpack-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  minio_data: