name: CD - Release and Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version a empaqueter (ex: 1.2.0). Optionnel."
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      package_name: ${{ steps.meta.outputs.package_name }}
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
    steps:
      - name: Compute release variables
        id: meta
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            CLEAN_VERSION="${{ github.event.inputs.version }}"
            CLEAN_VERSION="${CLEAN_VERSION#v}"
            RELEASE_TAG="v${CLEAN_VERSION}"
          else
            RELEASE_TAG="sha-${GITHUB_SHA::7}"
          fi

          PACKAGE_NAME="logixpack-${RELEASE_TAG}"
          BACKEND_IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/logixpack-backend"
          FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/logixpack-frontend"

          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${BACKEND_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${FRONTEND_IMAGE}" >> "$GITHUB_OUTPUT"

  build-and-push-images:
    name: Build and push container images
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ needs.prepare.outputs.backend_image }}:${{ needs.prepare.outputs.release_tag }}
          cache-from: type=gha,scope=backend-release
          cache-to: type=gha,mode=max,scope=backend-release

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ needs.prepare.outputs.frontend_image }}:${{ needs.prepare.outputs.release_tag }}
          cache-from: type=gha,scope=frontend-release
          cache-to: type=gha,mode=max,scope=frontend-release

  package-bundle:
    name: Build deployment bundle
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-and-push-images
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Assemble release package
        run: |
          PACKAGE_NAME="${{ needs.prepare.outputs.package_name }}"
          RELEASE_TAG="${{ needs.prepare.outputs.release_tag }}"
          BACKEND_IMAGE="${{ needs.prepare.outputs.backend_image }}:${RELEASE_TAG}"
          FRONTEND_IMAGE="${{ needs.prepare.outputs.frontend_image }}:${RELEASE_TAG}"

          mkdir -p "dist/${PACKAGE_NAME}"

          cp docker-compose.release.yml "dist/${PACKAGE_NAME}/docker-compose.yml"
          cp deploy/README.md "dist/${PACKAGE_NAME}/README.md"

          cat > "dist/${PACKAGE_NAME}/.env" <<EOF
          BACKEND_IMAGE=${BACKEND_IMAGE}
          FRONTEND_IMAGE=${FRONTEND_IMAGE}
          NEXT_PUBLIC_API_URL=http://localhost:8000
          MINIO_ROOT_USER=minioadmin
          MINIO_ROOT_PASSWORD=minioadmin
          MINIO_BUCKET=rpc-instances
          EOF

          tar -czf "dist/${PACKAGE_NAME}.tar.gz" -C dist "${PACKAGE_NAME}"
          sha256sum "dist/${PACKAGE_NAME}.tar.gz" > "dist/${PACKAGE_NAME}.tar.gz.sha256"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.package_name }}
          path: |
            dist/${{ needs.prepare.outputs.package_name }}.tar.gz
            dist/${{ needs.prepare.outputs.package_name }}.tar.gz.sha256

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - package-bundle
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.package_name }}
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ needs.prepare.outputs.package_name }}.tar.gz
            dist/${{ needs.prepare.outputs.package_name }}.tar.gz.sha256
          generate_release_notes: true